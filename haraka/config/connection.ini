; Full Haraka connection.ini. We ship the complete default (rather than a
; partial override) so all sections Haraka reads at runtime — haproxy, message,
; uuid, headers, max — are present. We run no HAProxy in front, so hosts is empty.
[main]

[haproxy]
; Hosts/CIDRs allowed to use the PROXY protocol. Empty: none.
hosts[] =

[headers]
max_lines=1000
max_received=100

[max]
bytes=26214400
mime_parts=1000
line_length=512
data_line_length=992

[message]
helo=Haraka is at your service.
close=closing connection. Have a jolly good day.

[uuid]
banner_chars=6
deny_chars=0
