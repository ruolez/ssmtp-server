; DKIM signing for outbound relay mail (haraka-plugin-dkim).
; Per-domain keys are read from config/dkim/<domain>/{private,selector}, which
; the web service generates into the shared dkim_keys volume. Signing each
; message with the sender domain's own key keeps DKIM aligned for DMARC.
[main]

[sign]
enabled = true
headers = From, Sender, Reply-To, Subject, Date, Message-ID, To, Cc, MIME-Version, Content-Type, Content-Transfer-Encoding

[canon]

; We are an outbound-only relay; no need to verify inbound signatures.
[verify]
enabled = false
