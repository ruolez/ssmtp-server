; Outbound delivery settings.
; Prefer IPv4 when connecting to remote MX hosts. This VPS has no IPv6 route, so
; trying IPv6 MX addresses first produced a recurring "Failed to get socket:
; connect ENETUNREACH …:25" on every send (it then fell back to IPv4). With v4
; first, delivery goes straight over IPv4 and never attempts the dead IPv6 path.
inet_prefer=v4
