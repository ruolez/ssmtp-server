<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in · ssmtp-server</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="login-wrap">
      <form class="login-card" method="POST" action="/login">
        <div class="login-brand">
          <div class="brand-mark">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9 6 9-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
          </div>
          <div class="login-title">ssmtp-server</div>
          <div class="dim" style="font-family: var(--mono); font-size: 12px;">relay console</div>
        </div>

        {% if error %}<div class="login-err">{{ error }}</div>{% endif %}

        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn btn-primary" type="submit" style="width: 100%; justify-content: center;">Sign in</button>
      </form>
    </div>
    <script src="/static/js/theme.js"></script>
  </body>
</html>
